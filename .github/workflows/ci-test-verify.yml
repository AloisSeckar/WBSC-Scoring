# Runs test suite in a pinned Playwright container for reproducible results.
# Triggered automatically on pull requests to main with possible manual dispatch.
# If tests fail, `ci-test-report` artifact is uploaded so results can be inspected.

name: CI Tests (verify)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-test-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      # update when `playwright` dependency changes
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    env:
      # --no-sandbox option for Chromium due to execution by container root
      CHROMIUM_SANDBOX_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-test-report
          path: |
            test/validations/__current__
            test/actions/__current__
            test/screenshots/__current__
          if-no-files-found: ignore
          retention-days: 14
